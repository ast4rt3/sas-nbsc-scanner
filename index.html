  <script>
    const resultDiv = document.getElementById('result');
    const manualEntryDiv = document.getElementById('manual-entry');
    let html5QrcodeScanner;
    let windowStatusInterval;

    // --- Password toggle ---
    const passwordField = document.querySelector("#pass");
    const eyeIcon = document.querySelector("#icon");
    eyeIcon.addEventListener("click", function () {
        const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
        passwordField.setAttribute("type", type);
        this.classList.toggle("bx-hide");
        this.classList.toggle("bx-show");
    });

    // --- LOGIN ---
    function attemptLogin() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const btn = event.target;
        if (!user || !pass) return;
        btn.innerText = "Verifying...";
        document.getElementById('loginErr').innerText = "";
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const deviceInfo = (isMobile ? "Mobile: " : "PC: ") + navigator.platform;
        
        google.script.run
            .withSuccessHandler(function(response) {
                if (response.success) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('scannerUser', user);
                    document.getElementById('loginOverlay').style.display = 'none';
                } else {
                    btn.innerText = "Login";
                    document.getElementById('loginErr').innerText = response.message;
                }
            })
            .loginUser(user, pass, deviceInfo);
    }

    window.onload = function() {
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
        }
    };

    // --- NAVIGATION ---
    function enterScanner() {
        document.getElementById("homeScreen").style.display = "none";
        document.getElementById("scannerScreen").style.display = "flex";
        updateQueueUI();
        startScanner();
        checkWindowStatus();
        windowStatusInterval = setInterval(checkWindowStatus, 60000);
    }

  // --- WINDOW STATUS ---
function checkWindowStatus() {
    google.script.run
        .withSuccessHandler(function(res) {
            // SAVE TO GLOBAL VARIABLE
            currentWindowInfo = res; 

            const bar  = document.getElementById('windowStatus');
            const dot  = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (!res) {
                bar.className  = 'status-closed';
                dot.className  = 'status-dot closed';
                text.innerText = 'Connection Error';
                return;
            }
            
            if (res.isOpen) {
                bar.className  = 'status-open';
                dot.className  = 'status-dot open';
                text.innerText = 'OPEN — ' + res.type
                    + ' · ' + res.start + ' – ' + res.end
                    + ' · Col ' + res.col
                    + (res.isLate ? ' · LATE' : '');
            } else {
                bar.className  = 'status-closed';
                dot.className  = 'status-dot closed';
                text.innerText = res.nextType
                    ? 'CLOSED — Next: ' + res.nextType + ' · ' + res.nextStart + ' – ' + res.nextEnd
                    : 'CLOSED — No more windows today';
            }
        })
        .getWindowStatus();
}

    // --- SCANNER ---
    function startScanner() {
        let screenWidth = window.innerWidth || document.documentElement.clientWidth;
        let qrBoxSize = screenWidth < 400 ? 200 : 250;
        html5QrcodeScanner = new Html5QrcodeScanner("reader", {
            fps: 15,
            qrbox: { width: qrBoxSize, height: qrBoxSize }
        });
        html5QrcodeScanner.render(processToken);
    }

    function resetScanner() {
        resultDiv.style.display = 'none';
        manualEntryDiv.style.display = 'block';
        if (html5QrcodeScanner) html5QrcodeScanner.render(processToken);
    }

    function processToken(decodedText) {
    if (html5QrcodeScanner) { html5QrcodeScanner.clear().catch(e => {}); }
    manualEntryDiv.style.display = 'none';
    resultDiv.style.display = 'block';

    const token       = extractID(decodedText);
    const scannerUser = sessionStorage.getItem('scannerUser') || 'Unknown';

    if (!navigator.onLine) {
        const master = JSON.parse(localStorage.getItem('nbsc_offline_master') || "{}");
        const name   = master[token.replace(/\s+/g,"").toLowerCase()] || master[token] || "UNKNOWN STUDENT";

        saveToOfflineQueue(token, name); // save immediately to capture correct timestamp
        
        // ADDED: Update Recent Scans List for Offline
            const winName = (currentWindowInfo && currentWindowInfo.isOpen) ? currentWindowInfo.type : "OFFLINE";
            addToRecentScans(name.toUpperCase(), token, winName + " (SAVED)");

        resultDiv.className = "warning";
        resultDiv.innerHTML = `
            <span class="result-icon">📴</span>
            <h3>OFFLINE SAVED</h3>
            <p><b>${name.toUpperCase()}</b></p>
            <button class="scan-btn-next" onclick="resetScanner()">NEXT SCAN</button>
            <button class="flag-btn" onclick="toggleFlagBox()">🚩 FLAG THIS STUDENT</button>
            <div class="flag-reason-box" id="flagReasonBox" style="display:none; background:rgba(0,0,0,0.15); border-radius:10px; padding:12px; margin-top:10px;">
                <select id="flagReasonSelect" style="width:100%; padding:12px; border-radius:8px; border:none; font-family:Montserrat,sans-serif; margin-bottom:10px;">
                    <option value="">— Select Reason —</option>
                    <option value="Using someone else's QR">Using someone else's QR</option>
                    <option value="Suspicious behavior">Suspicious behavior</option>
                    <option value="Not the student in the QR">Not the student in the QR</option>
                    <option value="Already scanned elsewhere">Already scanned elsewhere</option>
                    <option value="Other">Other</option>
                </select>
                <p style="font-size:0.7rem;color:rgba(255,255,255,0.6);margin-bottom:8px;font-style:italic;">⚠ Offline: flag syncs when online</p>
                <button onclick="confirmOfflineFlag('${token.replace(/'/g,"\\'")}', '${name.replace(/'/g,"\\'")}')
                " style="width:100%;padding:14px;background:#dc2626;color:white;border:none;border-radius:8px;font-weight:800;font-family:Montserrat,sans-serif;cursor:pointer;">🚩 CONFIRM FLAG</button>
            </div>`;
        return;
    }

    resultDiv.className = "processing";
    resultDiv.innerHTML = `<span class="result-icon">🔄</span><h3>Verifying...</h3>`;

    google.script.run
        .withSuccessHandler(function(response) {
            let colorClass = response.status === "success" ? "success" : response.status === "warning" ? "warning" : "error";
            let icon = response.status === "success" ? "✅" : response.status === "warning" ? "⚠️" : "❌";

            // ADDED THIS PART: Update Recent Scans for Online Success
            if (response.status === "success") {
                addToRecentScans(response.studentName, token, response.windowType || "RECORDED");
            }

            const showFlag = response.status === "success" || response.status === "warning";
            resultDiv.className = colorClass;
            resultDiv.innerHTML = `
                <span class="result-icon">${icon}</span>
                <p>${response.message}</p>
                <button class="scan-btn-next" onclick="resetScanner()">NEXT SCAN</button>
                ${showFlag ? `
                <button class="flag-btn" onclick="toggleFlagBox()">🚩 FLAG THIS STUDENT</button>
                <div id="flagReasonBox" style="display:none;background:rgba(0,0,0,0.15);border-radius:10px;padding:12px;margin-top:10px;">
                    <select id="flagReasonSelect" style="width:100%;padding:12px;border-radius:8px;border:none;font-family:Montserrat,sans-serif;margin-bottom:10px;">
                        <option value="">— Select Reason —</option>
                        <option value="Using someone else's QR">Using someone else's QR</option>
                        <option value="Suspicious behavior">Suspicious behavior</option>
                        <option value="Not the student in the QR">Not the student in the QR</option>
                        <option value="Already scanned elsewhere">Already scanned elsewhere</option>
                        <option value="Other">Other</option>
                    </select>
                    <button onclick="confirmOnlineFlag('${token.replace(/'/g,"\\'")}')
                    " style="width:100%;padding:14px;background:#dc2626;color:white;border:none;border-radius:8px;font-weight:800;font-family:Montserrat,sans-serif;cursor:pointer;">🚩 CONFIRM FLAG</button>
                </div>` : ''}`;
        })
        .checkTicket(decodedText, scannerUser);
}

/** Standardizes time strings for the frontend */
function getMinutesHelper(timeStr) {
    if (!timeStr) return null;
    const timeParts = timeStr.toString().match(/(\d+):(\d+)\s*(AM|PM)?/i);
    if (!timeParts) return null;
    let hours = parseInt(timeParts[1]);
    let minutes = parseInt(timeParts[2]);
    let mod = timeParts[3] ? timeParts[3].toUpperCase() : null;
    if (mod === 'PM' && hours < 12) hours += 12;
    if (mod === 'AM' && hours === 12) hours = 0;
    return (hours * 60) + minutes;
}

/** Extracts minutes from a recorded cell string like "8:30 AM [Officer]" */
function getRecordedMinutes(cellValue) {
    if (!cellValue) return null;
    // Splits the time away from the officer name and parses it
    const timePart = cellValue.split('[')[0].trim();
    return getMinutesHelper(timePart);
}

    function extractID(raw) {
  if (!raw) return "";
  let id = raw.toString().trim();
  
  // Handle URLs
  if (id.includes("auth_key="))   id = id.split("auth_key=")[1].split("&")[0];
  else if (id.includes("ACCESS_KEY=")) id = id.split("ACCESS_KEY=")[1].split("/")[0];
  
  // If there's a comma (multiple tokens in one scan), take the first one 
  // or handle the split in the calling function. 
  // For standard single-scans, just strip spaces.
  return id.split(",")[0].replace(/\s+/g, "");
}

    function submitManualToken() {
        const input = document.getElementById('tokenInput');
        if (input.value) processToken(input.value);
        input.value = "";
    }

  function saveToOfflineQueue(code, name, isFlagged = false, reason = "") {
    let queue = JSON.parse(localStorage.getItem('nbsc_offline_scans') || "[]");

    if (isFlagged) {
        // Remove the regular scan entry for this student — flag replaces it
        queue = queue.filter(item => !(item.code === code && !item.isFlagged));
    } else {
        // Don't add a duplicate regular scan
        if (queue.some(item => item.code === code && !item.isFlagged)) return;
    }

    queue.push({ code, name, timestamp: new Date().toISOString(), isFlagged, reason });
    localStorage.setItem('nbsc_offline_scans', JSON.stringify(queue));
    updateQueueUI();
      }

    async function syncOfflineData() {
    if (!navigator.onLine) return showCustomModal("📶", "Offline", "No internet connection.");
    let queue = JSON.parse(localStorage.getItem('nbsc_offline_scans') || "[]");
    if (queue.length === 0) return showCustomModal("✅", "Nothing to Sync", "Queue is empty.");

    const total       = queue.length;
    const CHUNK_SIZE  = 10;
    const scannerUser = sessionStorage.getItem('scannerUser') || 'Unknown';
    let uploaded = 0;

    // Show modal with log UI
    document.getElementById('modal-icon').innerText  = "🔄";
    document.getElementById('modal-title').innerText = "Syncing";
    document.getElementById('modal-text').innerText  = "";
    document.getElementById('progressBarContainer').style.display = 'block';
    document.getElementById('progressText').innerText = "0%";
    document.getElementById('syncProgressBar').style.width = "0%";
    document.getElementById('modalCloseBtn').style.display = 'none';

    // Inject scrolling log box into modal
    let logBox = document.getElementById('syncLogBox');
    if (!logBox) {
        logBox = document.createElement('div');
        logBox.id = 'syncLogBox';
        logBox.style.cssText = `
            max-height: 140px; overflow-y: auto; background: rgba(0,0,0,0.3);
            border-radius: 8px; padding: 8px 10px; margin-top: 10px;
            font-size: 0.7rem; font-family: monospace; color: #a3e635;
            text-align: left; line-height: 1.6;
        `;
        document.getElementById('modal-progress-section').after(logBox);
    }
    logBox.innerHTML = "";
    logBox.style.display = 'block';
    document.getElementById('syncModal').style.display = 'flex';

    function log(msg) {
        logBox.innerHTML += msg + "<br>";
        logBox.scrollTop = logBox.scrollHeight;
    }

    log("▶ Starting upload of " + total + " record(s)...");

    // Process in chunks
    const remaining = [...queue];
    while (remaining.length > 0) {
        const chunk = remaining.splice(0, CHUNK_SIZE);
        const formatted = chunk.map(item => ({
            scannedID: item.code,
            timestamp: item.timestamp,
            isFlagged: item.isFlagged || false,
            reason:    item.reason   || ""
        }));

        // Log each item in this chunk
        chunk.forEach(item => {
            const flag = item.isFlagged ? " 🚩 [FLAG]" : "";
            log("↑ " + item.name + flag);
        });

        try {
            await new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(res => {
                        if (res.status === "success") resolve();
                        else reject(res.message || "Server error");
                    })
                    .withFailureHandler(err => reject(err.toString()))
                    .syncOfflineScans(formatted, scannerUser);
            });

            uploaded += chunk.length;
            const pct = Math.round((uploaded / total) * 100);
            document.getElementById('syncProgressBar').style.width = pct + "%";
            document.getElementById('progressText').innerText = pct + "% — " + uploaded + " / " + total;
            log("✔ Chunk done (" + uploaded + "/" + total + ")");

        } catch (err) {
            log("✖ Error: " + err);
            document.getElementById('modalCloseBtn').style.display = 'block';
            document.getElementById('modal-title').innerText = "Sync Paused";
            return;
        }
    }

    // All done
    localStorage.removeItem('nbsc_offline_scans');
    updateQueueUI();
    log("✅ All " + total + " records uploaded successfully.");
    document.getElementById('progressText').innerText = "100% — Complete";
    document.getElementById('modal-title').innerText = "Done";
    document.getElementById('modalCloseBtn').style.display = 'block';

    // Hide log box and reset bar after close
    document.getElementById('modalCloseBtn').onclick = function() {
        document.getElementById('syncModal').style.display = 'none';
        logBox.style.display = 'none';
        document.getElementById('syncProgressBar').style.width = "0%";
        document.getElementById('progressBarContainer').style.display = 'none';
    };
}
    function toggleFlagBox() {
    const box = document.getElementById('flagReasonBox');
    if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function confirmOfflineFlag(token, name) {
    const reason = document.getElementById('flagReasonSelect')?.value;
    if (!reason) { alert("Please select a reason."); return; }
    saveToOfflineQueue(token, name, true, reason);
    resultDiv.className = "error";
    resultDiv.innerHTML = `
        <span class="result-icon">🚩</span>
        <h3>FLAGGED (Offline)</h3>
        <p><b>${name.toUpperCase()}</b><br><small>Reason: ${reason} — syncs when online.</small></p>
        <button class="scan-btn-next" onclick="resetScanner()">NEXT SCAN</button>`;
}
function clearOfflineQueue() {
    if (!confirm("Delete all " + JSON.parse(localStorage.getItem('nbsc_offline_scans')||'[]').length + " pending scans? This cannot be undone.")) return;
    localStorage.removeItem('nbsc_offline_scans');
    updateQueueUI();
    showCustomModal("🗑️", "Cleared", "Offline queue has been cleared.");
}

function confirmOnlineFlag(token) {
    const reason = document.getElementById('flagReasonSelect')?.value;
    if (!reason) { alert("Please select a reason."); return; }
    const scannerUser = sessionStorage.getItem('scannerUser') || 'Unknown';
    google.script.run
        .withSuccessHandler(function() {
            resultDiv.className = "error";
            resultDiv.innerHTML = `
                <span class="result-icon">🚩</span>
                <h3>STUDENT FLAGGED</h3>
                <p>Reason: ${reason}</p>
                <button class="scan-btn-next" onclick="resetScanner()">NEXT SCAN</button>`;
        })
        .flagStudent(token, reason, scannerUser);
}
    function updateQueueUI() {
        let queue = JSON.parse(localStorage.getItem('nbsc_offline_scans') || "[]");
        const bar = document.getElementById('offline-status');
        if (bar) bar.style.display = queue.length > 0 ? 'block' : 'none';
        
        const count = document.getElementById('pending-count');
        if (count) count.innerText = queue.length;

        const list = document.getElementById('offline-list-names');
        if (!list) return;

        if (queue.length === 0) {
            list.innerHTML = "<p>Queue is empty</p>";
            return;
        }

        let html = "<ul>";
        queue.slice().reverse().forEach(item => {
            html += `<li><b>${item.name}</b></li>`;
        });
        html += "</ul>";
        list.innerHTML = html;
    }
    
    function toggleOfflineLog() {
        const log = document.getElementById('offline-log-container');
        log.style.display = log.style.display === 'none' ? 'block' : 'none';
        updateQueueUI();
    }

    function downloadMasterlist() {
    if (!navigator.onLine) return showCustomModal("📶", "Offline", "You need internet to update offline data.");

    // Show modal with log UI
    document.getElementById('modal-icon').innerText  = "⬇️";
    document.getElementById('modal-title').innerText = "Updating";
    document.getElementById('modal-text').innerText  = "";
    document.getElementById('progressBarContainer').style.display = 'block';
    document.getElementById('progressText').innerText = "Downloading...";
    document.getElementById('syncProgressBar').style.width = "0%";
    document.getElementById('modalCloseBtn').style.display = 'none';
    document.getElementById('syncModal').style.display = 'flex';

    // Inject or reuse log box
    let logBox = document.getElementById('syncLogBox');
    if (!logBox) {
        logBox = document.createElement('div');
        logBox.id = 'syncLogBox';
        logBox.style.cssText = `
            max-height: 140px; overflow-y: auto; background: rgba(0,0,0,0.3);
            border-radius: 8px; padding: 8px 10px; margin-top: 10px;
            font-size: 0.7rem; font-family: monospace; color: #a3e635;
            text-align: left; line-height: 1.6;
        `;
        document.getElementById('modal-progress-section').after(logBox);
    }
    logBox.innerHTML = "";
    logBox.style.display = 'block';

    function log(msg) {
        logBox.innerHTML += msg + "<br>";
        logBox.scrollTop = logBox.scrollHeight;
    }

    log("▶ Connecting to server...");
    document.getElementById('syncProgressBar').style.width = "20%";

    google.script.run
        .withSuccessHandler(function(data) {
            log("✔ Data received from server.");
            document.getElementById('syncProgressBar').style.width = "60%";
            document.getElementById('progressText').innerText = "Processing...";

            // Count entries
            const entries = Object.keys(data).length;
            log("↓ Processing " + entries + " token entries...");

            localStorage.setItem('nbsc_offline_master', JSON.stringify(data));
            document.getElementById('syncProgressBar').style.width = "100%";
            document.getElementById('progressText').innerText = "100% — Complete";

            // Count unique student names
            const uniqueNames = new Set(Object.values(data)).size;
            log("✅ Saved " + uniqueNames + " students (" + entries + " tokens) to offline storage.");
            log("✔ Offline data is up to date.");

            document.getElementById('modal-icon').innerText  = "✅";
            document.getElementById('modal-title').innerText = "Done";
            document.getElementById('modalCloseBtn').style.display = 'block';

            document.getElementById('modalCloseBtn').onclick = function() {
                document.getElementById('syncModal').style.display = 'none';
                logBox.style.display = 'none';
                document.getElementById('syncProgressBar').style.width = "0%";
                document.getElementById('progressBarContainer').style.display = 'none';
                document.getElementById('modalCloseBtn').onclick = closeModal;
            };
        })
        .withFailureHandler(function(err) {
            log("✖ Error: " + err.toString());
            document.getElementById('modal-icon').innerText  = "❌";
            document.getElementById('modal-title').innerText = "Failed";
            document.getElementById('modalCloseBtn').style.display = 'block';
        })
        .getOfflineMasterlist();
}

function addToRecentScans(name, token, windowName) {
    const list = document.getElementById('recentScansList');
    if (!list) return;

    // Remove "No scans" placeholder
    const emptyMsg = list.querySelector('p');
    if (emptyMsg) emptyMsg.remove();

    const item = document.createElement('div');
    
    // Determine type for color coding
    const isOut = windowName.toLowerCase().includes('out') || windowName.toLowerCase().includes('offline');
    item.className = `recent-item ${isOut ? 'type-out' : 'type-in'}`;

    item.innerHTML = `
        <span class="recent-window">${windowName}</span>
        <div class="recent-flex">
            <span class="recent-name">${name}</span>
            <span class="recent-token">${token}</span>
        </div>
    `;

    // Add to top with a small fade-in effect if you want to add animation later
    list.insertBefore(item, list.firstChild);

    // Maintain limit of 5 scans
    if (list.children.length > 5) {
        list.removeChild(list.lastChild);
    }
}

function clearRecentScans() {
    const list = document.getElementById('recentScansList');
    if (list) {
        list.innerHTML = '<p style="padding: 20px; text-align: center; color: #cbd5e1; font-size: 0.8rem;">No scans in this session</p>';
    }
}

    function showCustomModal(icon, title, text) {
        document.getElementById('modal-icon').innerText = icon;
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('syncModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('syncModal').style.display = 'none'; }
</script>
